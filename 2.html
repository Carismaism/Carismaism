<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title> 表单</title>
    </head>
    <body>
        <h1>注册表</h1>
        <form>
            用户名: <input type="text" name="firstname"><br>
            密  码: <input type="password" name="pwd"><br>
            性 别:  <input type="radio" name="sex" value="male">男
                    <input type="radio" name="sex" value="female">女<br>
            爱 好： <input type="checkbox" name="hobby" value="1">学习
                    <input type="checkbox" name="hobby" value="2">python
                    <input type="checkbox" name="hobby" value="3">前端
                    <input type="checkbox" name="hobby" value="4">美少女<br>
            玉 照：  <input type="file"><br>
            个人介绍：   <textarea  rows=3 cols=10></textarea><br>
            籍 贯：  <select>
                        <option value="北京">北京</option>
                        <option value="上海">上海</option>
                    </select><br>
                    <button type="button">提交</button>
                    <button type="button">重制</button>
        </form>
    </body>
</html>
